<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Web-Based Game Engine</title>
  </head>
  <body>
    <div id="app">
      <div class="game-container">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        
        <!-- HUD Overlay -->
        <div id="hudOverlay" style="
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          pointer-events: none;
          z-index: 100;
        ">
          <!-- FPS Counter (top-left) -->
          <div id="fpsCounter" style="
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 8px 12px;
            border: 1px solid #00ff00;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            pointer-events: auto;
          ">FPS: 0</div>
          
          <!-- Level Display (top-center) -->
          <div id="levelDisplay" style="
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: #ffd700;
            padding: 8px 16px;
            border: 1px solid #ffd700;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1em;
            pointer-events: auto;
          ">Level 1: The Dungeon</div>
          
          <!-- HUD Buttons (top-right) -->
          <div id="hudButtons" style="
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
          ">
            <button id="pauseButton" style="
              padding: 8px 15px;
              background-color: #ff6b6b;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-size: 0.9em;
              font-weight: bold;
            ">Pause</button>
            <button id="saveButton" style="
              padding: 8px 15px;
              background-color: #51cf66;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-size: 0.9em;
              font-weight: bold;
            ">Save</button>
            <button id="loadButton" style="
              padding: 8px 15px;
              background-color: #4c6ef5;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-size: 0.9em;
              font-weight: bold;
            ">Load</button>
            <button id="skipDialogueButton" style="
              padding: 8px 15px;
              background-color: #ffa94d;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-size: 0.9em;
              font-weight: bold;
            ">Skip</button>
          </div>
        </div>
      </div>
      <div class="ui-panel">
        <div class="info-section">
          <div class="coordinate-info">
            <span>
              <strong>Player:</strong>
              <span id="playerCoords">0, 0</span>
            </span>
            <span>
              <strong>Mouse:</strong>
              <span id="mouseCoords">0, 0</span>
            </span>
            <span>
              <strong>Health:</strong>
              <span id="playerHealth">100/100</span>
            </span>
          </div>
        </div>
        <div class="instructions">
          <p><strong>Controls:</strong> Left Click = Move/Interact | Right Click = Move</p>
        </div>
        <div class="action-buttons">
          <button id="inventoryButton" style="
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
          ">Inventory</button>
        </div>
      </div>

      <!-- Dialogue Box -->
      <div id="dialogueBox" style="
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        max-width: 800px;
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        font-family: monospace;
        display: none; /* Hidden by default */
        box-sizing: border-box;
        z-index: 1000;
      ">
        <p id="dialogueSpeaker" style="font-weight: bold; color: #ffd700; margin-bottom: 10px;"></p>
        <p id="dialogueText" style="margin-bottom: 15px; line-height: 1.5;"></p>
        <div style="text-align: right; font-size: 0.9em; color: #aaa;">
          Click to continue
        </div>
      </div>

      <!-- Inventory Panel -->
      <div id="inventoryPanel" style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60%;
        max-width: 600px;
        height: 70%;
        max-height: 500px;
        background-color: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        font-family: monospace;
        display: none; /* Hidden by default */
        box-sizing: border-box;
        z-index: 1001;
        overflow-y: auto;
      ">
        <h2 style="text-align: center; color: #00ff00; margin-top: 0;">Inventory</h2>
        <ul id="inventoryList" style="list-style: none; padding: 0;">
          <!-- Inventory items will be listed here -->
        </ul>
        <div style="text-align: right; font-size: 0.9em; color: #aaa; margin-top: 15px;">
          Click "Inventory" button to close
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
