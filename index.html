<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Replaced local favicon with an inline SVG to prevent broken icons in preview -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn46uPC90ZXh0Pjwvc3ZnPg==" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Web-Based Game Engine</title>
  </head>
  <body>
    <div id="app">
      <div class="game-container">
        <!-- Scale the canvas down slightly via CSS to fit typical previews nicely, keeps pixel aspect ratio -->
        <canvas id="gameCanvas" width="1280" height="720" style="max-width: 100%; max-height: 100vh;"></canvas>

        <div id="hudOverlay" class="hud-overlay">

          <!-- Top Left: Health -->
          <div class="hud-element" style="position: absolute; top: 15px; left: 15px; color: #ff3b30; font-size: 1.2em; font-weight: bold; text-shadow: 1px 1px 0 #000;">
            HP: <span id="playerHealth">100/100</span>
          </div>

          <!-- Top Center: Level Display -->
          <div id="levelDisplay" class="hud-element level-display">Level 1: The Wilds</div>

          <!-- Top Right: Collapsible Menu -->
          <div class="menu-container">
            <button id="menuToggleButton" class="rpg-button">Menu ☰</button>
            <div id="hudButtons" class="hud-buttons">
                <button id="muteButton" class="rpg-button">Mute</button>
              <button id="pauseButton" class="rpg-button btn-danger">Pause</button>
              <button id="saveButton" class="rpg-button btn-success">Save</button>
              <button id="loadButton" class="rpg-button btn-primary">Load</button>
              <button id="skipDialogueButton" class="rpg-button btn-warning">Skip</button>
            </div>
          </div>

          <!-- Bottom Center: Instructions -->
          <div class="hud-element" style="position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 0.9em; color: #aaa; pointer-events: none;">
            L-Click: Interact | R-Click: Move
          </div>

          <!-- Bottom Right: Inventory Bag -->
          <button id="inventoryButton" class="rpg-button bag-button">🎒</button>

          <!-- Bottom Left: Dev Tools -->
          <div class="dev-tools-wrapper">
            <div id="devToolsPanel" class="rpg-panel dev-tools-panel">
              <div id="fpsCounter" class="fps-counter">FPS: 60</div>
              <div><strong>Player:</strong> <span id="playerCoords">0, 0</span></div>
              <div><strong>Mouse:</strong> <span id="mouseCoords">0, 0</span></div>
            </div>
            <label class="hud-element" style="cursor: pointer; display: inline-flex; align-items: center; gap: 8px; width: fit-content; font-size: 0.9em;">
              <input type="checkbox" id="devToolsCheckbox" style="cursor: pointer;"> Dev Tools
            </label>
          </div>

        </div>
      </div>

      <!-- Dialogue Box -->
      <div id="dialogueBox" class="rpg-panel dialogue-box">
        <p id="dialogueSpeaker" class="dialogue-speaker"></p>
        <p id="dialogueText" class="dialogue-text"></p>
        <div class="dialogue-prompt">▼ Click to continue ▼</div>
      </div>

      <!-- Inventory Panel -->
      <div id="inventoryPanel" class="rpg-panel inventory-panel">
        <h2 class="panel-title">Inventory</h2>
        <ul id="inventoryList" class="inventory-list">
          <!-- Inventory items populated by engine -->
        </ul>
        <div class="close-prompt">Click the Bag icon to close</div>
      </div>
    </div>

    <!-- UI Toggle Logic -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Menu Toggle
        const menuBtn = document.getElementById('menuToggleButton');
        const hudBtns = document.getElementById('hudButtons');
        menuBtn.addEventListener('click', () => {
          hudBtns.classList.toggle('open');
        });

        // Dev Tools Toggle
        const devCheckbox = document.getElementById('devToolsCheckbox');
        const devPanel = document.getElementById('devToolsPanel');
        devCheckbox.addEventListener('change', (e) => {
          if (e.target.checked) {
            devPanel.classList.add('open');
          } else {
            devPanel.classList.remove('open');
          }
        });
      });
    </script>

    <!-- The actual game engine script -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
