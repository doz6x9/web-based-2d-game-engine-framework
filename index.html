<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Web-Based Game Engine</title>
  </head>
  <body>
    <div id="app">
      <div class="game-container">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
      </div>
      <div class="ui-panel">
        <div class="info-section">
          <div class="coordinate-info">
            <span>
              <strong>Player:</strong>
              <span id="playerCoords">0, 0</span>
            </span>
            <span>
              <strong>Mouse:</strong>
              <span id="mouseCoords">0, 0</span>
            </span>
          </div>
        </div>
        <div class="instructions">
          <p><strong>Controls:</strong> Left Click = Move/Interact | Right Click = Move</p>
        </div>
        <div class="action-buttons">
          <button id="inventoryButton" style="
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
          ">Inventory</button>
        </div>
      </div>

      <!-- Dialogue Box -->
      <div id="dialogueBox" style="
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        max-width: 800px;
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        font-family: monospace;
        display: none; /* Hidden by default */
        box-sizing: border-box;
        z-index: 1000;
      ">
        <p id="dialogueSpeaker" style="font-weight: bold; color: #ffd700; margin-bottom: 10px;"></p>
        <p id="dialogueText" style="margin-bottom: 15px; line-height: 1.5;"></p>
        <div style="text-align: right; font-size: 0.9em; color: #aaa;">
          Click to continue
        </div>
      </div>

      <!-- Inventory Panel -->
      <div id="inventoryPanel" style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60%;
        max-width: 600px;
        height: 70%;
        max-height: 500px;
        background-color: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        font-family: monospace;
        display: none; /* Hidden by default */
        box-sizing: border-box;
        z-index: 1001;
        overflow-y: auto;
      ">
        <h2 style="text-align: center; color: #00ff00; margin-top: 0;">Inventory</h2>
        <ul id="inventoryList" style="list-style: none; padding: 0;">
          <!-- Inventory items will be listed here -->
        </ul>
        <div style="text-align: right; font-size: 0.9em; color: #aaa; margin-top: 15px;">
          Click "Inventory" button to close
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
